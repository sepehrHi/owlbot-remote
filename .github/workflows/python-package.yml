name: OwlBot CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps for audio / opencv
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev ffmpeg

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build & lint tools
        run: pip install build flake8

      - name: Lint with flake8 (critical only)
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (style, non‑blocking)
        run: flake8 src/ --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics

      - name: Build package
        run: python -m build

      - name: Check dist
        run: ls -la dist/
